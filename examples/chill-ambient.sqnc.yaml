# chill-ambient.sqnc.yaml
# SqncR Sequence Format v1
# Example: simple ambient piece demonstrating basics

meta:
  title: "Late Night Ambient"
  tempo: 70
  key: Cm
  time: { beats: 4, division: 4 }
  tpq: 480
  created: 2026-01-29T20:25:00Z

intent:
  - "chill ambient in C minor, 70bpm"
  - "spacious, Rothko-esque pads"

devices:
  bass: { name: "Polyend Synth", ch: 1 }
  pads: { name: "Polyend Synth", ch: 2 }

patterns:
  bass_Cm:
    length: 7680  # 4 bars
    defaults:
      vel: { range: [65, 75] }
      t_rand: { range: [-20, 20] }
    events:
      - { t: 0,    type: note, note: C2, dur: 1920 }
      - { t: 1920, type: note, note: C2, dur: 1920 }
      - { t: 3840, type: note, note: C2, dur: 1920 }
      - { t: 5760, type: note, note: C2, dur: 1920 }

  bass_Ab:
    length: 7680
    defaults:
      vel: { range: [65, 75] }
      t_rand: { range: [-20, 20] }
    events:
      - { t: 0,    type: note, note: Ab1, dur: 1920 }
      - { t: 1920, type: note, note: Ab1, dur: 1920 }
      - { t: 3840, type: note, note: Ab1, dur: 1920 }
      - { t: 5760, type: note, note: Ab1, dur: 1920 }

  bass_Eb:
    length: 7680
    defaults:
      vel: { range: [65, 75] }
      t_rand: { range: [-20, 20] }
    events:
      - { t: 0,    type: note, note: Eb2, dur: 1920 }
      - { t: 1920, type: note, note: Eb2, dur: 1920 }
      - { t: 3840, type: note, note: Eb2, dur: 1920 }
      - { t: 5760, type: note, note: Eb2, dur: 1920 }

  bass_Bb:
    length: 7680
    defaults:
      vel: { range: [65, 75] }
      t_rand: { range: [-20, 20] }
    events:
      - { t: 0,    type: note, note: Bb1, dur: 1920 }
      - { t: 1920, type: note, note: Bb1, dur: 1920 }
      - { t: 3840, type: note, note: Bb1, dur: 1920 }
      - { t: 5760, type: note, note: Bb1, dur: 1920 }

  pad_Cm7:
    length: 7680
    defaults:
      vel: { range: [45, 60] }
    events:
      - { t: 0, type: note, note: C4,  dur: 7680 }
      - { t: 0, type: note, note: Eb4, dur: 7680 }
      - { t: 0, type: note, note: G4,  dur: 7680 }
      - { t: 0, type: note, note: Bb4, dur: 7680, prob: 0.8 }  # sometimes skip 7th

  pad_Abmaj7:
    length: 7680
    defaults:
      vel: { range: [45, 60] }
    events:
      - { t: 0, type: note, note: Ab3, dur: 7680 }
      - { t: 0, type: note, note: C4,  dur: 7680 }
      - { t: 0, type: note, note: Eb4, dur: 7680 }
      - { t: 0, type: note, note: G4,  dur: 7680, prob: 0.8 }

  pad_Ebmaj7:
    length: 7680
    defaults:
      vel: { range: [45, 60] }
    events:
      - { t: 0, type: note, note: Eb4, dur: 7680 }
      - { t: 0, type: note, note: G4,  dur: 7680 }
      - { t: 0, type: note, note: Bb4, dur: 7680 }
      - { t: 0, type: note, note: D5,  dur: 7680, prob: 0.8 }

  pad_Bbmaj7:
    length: 7680
    defaults:
      vel: { range: [45, 60] }
    events:
      - { t: 0, type: note, note: Bb3, dur: 7680 }
      - { t: 0, type: note, note: D4,  dur: 7680 }
      - { t: 0, type: note, note: F4,  dur: 7680 }
      - { t: 0, type: note, note: A4,  dur: 7680, prob: 0.8 }

sections:
  progression:
    length: 30720  # 16 bars
    loopable: true
    tracks:
      - ch: 1
        sequence:
          - { at: 0,     pattern: bass_Cm }
          - { at: 7680,  pattern: bass_Ab }
          - { at: 15360, pattern: bass_Eb }
          - { at: 23040, pattern: bass_Bb }
      - ch: 2
        sequence:
          - { at: 0,     pattern: pad_Cm7 }
          - { at: 7680,  pattern: pad_Abmaj7 }
          - { at: 15360, pattern: pad_Ebmaj7 }
          - { at: 23040, pattern: pad_Bbmaj7 }

arrange:
  - { at: 0, section: progression }
  - { at: 30720, section: progression }  # repeat

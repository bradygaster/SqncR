# seven-nation-army.sqnc.yaml
# SqncR Sequence Format v1
# Example: demonstrates patterns, automation, tempo changes, groove templates

meta:
  title: "Seven Nation Army"
  artist: "The White Stripes"
  tempo: 124
  key: Em
  time: { beats: 4, division: 4 }
  swing: null
  tpq: 480  # ticks per quarter
  created: 2026-01-29T20:35:00Z

devices:
  bass: { name: "Moog Sub 37", ch: 1 }
  drums: { name: "Polyend Play", ch: 10 }
  lead: { name: "Polyend Synth", ch: 2 }

patterns:
  main_riff:
    length: 7680
    defaults:
      vel: { range: [85, 105] }
      t_rand: { range: [-15, 15] }
    events:
      # bar 1: E E G E D
      - { t: 0,    type: note, note: E2, dur: 480 }
      - { t: 480,  type: note, note: E2, dur: 480 }
      - { t: 960,  type: note, note: G2, dur: 480 }
      - { t: 1440, type: note, note: E2, dur: 480 }
      - { t: 1680, type: note, note: D2, dur: 240 }
      # bar 2: C . . B (held)
      - { t: 1920, type: note, note: C2, dur: 960 }
      - { t: 3360, type: note, note: B1, dur: 1440 }
      # bars 3-4: rest

  riff_with_glide:
    length: 7680
    events:
      - { t: 0,    type: note, note: E2, dur: 480, vel: 100 }
      - { t: 480,  type: note, note: E2, dur: 480, vel: 95 }
      # glide from G2 to E2 over 240 ticks
      - { t: 960,  type: note, note: G2, dur: 480, vel: 100, glide: { to: E2, time: 240 } }
      - { t: 1440, type: note, note: E2, dur: 480, vel: 90 }
      # pitch bend down 2 semitones
      - { t: 1680, type: note, note: D2, dur: 240, vel: 95, bend: { range: [0, -2], time: 200 } }
      - { t: 1920, type: note, note: C2, dur: 960, vel: 100 }
      - { t: 3360, type: note, note: B1, dur: 1440, vel: 95 }

  filter_sweep_pattern:
    length: 7680
    events:
      # CC 74 = filter cutoff (common)
      - { t: 0,    type: cc, cc: 74, value: 20 }
      - { t: 1920, type: cc, cc: 74, value: 80 }
      - { t: 3840, type: cc, cc: 74, value: 127 }
      - { t: 5760, type: cc, cc: 74, value: 60 }
      # CC 1 = mod wheel
      - { t: 0,    type: cc, cc: 1, value: 0 }
      - { t: 3840, type: cc, cc: 1, value: 100 }

  lead_with_expression:
    length: 3840
    events:
      - { t: 0, type: note, note: E4, dur: 3840, vel: 80 }
      # channel aftertouch swell
      - { t: 0,    type: aftertouch, value: 0 }
      - { t: 960,  type: aftertouch, value: 60 }
      - { t: 1920, type: aftertouch, value: 100 }
      - { t: 2880, type: aftertouch, value: 40 }
      # poly aftertouch (specific note)
      - { t: 0,    type: poly_aftertouch, note: E4, value: 0 }
      - { t: 1920, type: poly_aftertouch, note: E4, value: 127 }

  kick_pattern:
    length: 1920
    events:
      - { t: 0,    type: note, note: C1, vel: 110, dur: 120 }
      - { t: 960,  type: note, note: C1, vel: 100, dur: 120 }
      - { t: 1440, type: note, note: C1, vel: 90,  dur: 120, prob: 0.7 }

# continuous automation curves (separate from discrete events)
automation:
  filter_build:
    length: 15360  # 8 bars
    curves:
      - cc: 74
        points:
          - { t: 0, value: 20 }
          - { t: 7680, value: 60 }
          - { t: 15360, value: 127 }
        shape: exponential  # linear, exponential, logarithmic, s-curve

      - cc: 1  # mod wheel
        points:
          - { t: 0, value: 0 }
          - { t: 15360, value: 100 }
        shape: linear

  vibrato_lfo:
    length: 1920  # 1 bar, loopable
    curves:
      - type: pitch_bend
        points:
          - { t: 0, value: 0 }
          - { t: 240, value: 0.5 }   # semitones
          - { t: 480, value: 0 }
          - { t: 720, value: -0.5 }
          - { t: 960, value: 0 }
        shape: sine

# swing/groove templates
grooves:
  mpc60:
    grid: 16  # applies to 16th notes
    offsets: [0, 0, 54, 0, 0, 0, 54, 0, 0, 0, 54, 0, 0, 0, 54, 0]  # ticks

  lazy:
    grid: 8
    offsets: [0, 25, 0, 35, 0, 20, 0, 30]
    vel_scale: [1.0, 0.7, 0.9, 0.6, 1.0, 0.7, 0.85, 0.65]

sections:
  intro:
    length: 15360
    tempo: 124
    time: { beats: 4, division: 4 }
    loopable: true
    tracks:
      - ch: 1
        groove: mpc60
        sequence:
          - { at: 0, pattern: main_riff }
          - { at: 7680, pattern: main_riff }
      - ch: 10
        sequence:
          - { at: 0, pattern: kick_pattern, repeat: 8 }

  bridge:
    length: 15360
    tempo: 140  # tempo change
    time: { beats: 6, division: 8 }  # time sig change to 6/8
    tracks:
      - ch: 1
        sequence:
          - { at: 0, pattern: riff_with_glide, repeat: 2 }
      - ch: 2
        sequence:
          - { at: 0, pattern: lead_with_expression, repeat: 4 }
        automation:
          - { at: 0, curve: filter_build }

  breakdown:
    length: 30720
    loopable: true
    tracks:
      - ch: 2
        sequence:
          - { at: 0, pattern: lead_with_expression, repeat: 8 }
        automation:
          - { at: 0, curve: vibrato_lfo, repeat: 16 }
          - { at: 0, curve: filter_build, repeat: 2 }

arrange:
  - { at: 0,     section: intro }
  - { at: 15360, section: intro }
  - { at: 30720, section: bridge, crossfade: 480 }
  - { at: 46080, section: breakdown }
  - { at: 76800, section: intro, tempo_ramp: { to: 124, over: 3840 } }
